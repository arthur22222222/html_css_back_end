<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>

<script>
function pesquisar(cep){
    const cepInput = document.getElementById("cep");
    const erroCep = document.getElementById("cepErro");

    cep = cep.replace(/\D/g, '');

    if(cep.length === 8){
        cepInput.classList.remove("invalid");
        cepInput.setCustomValidity("");
        erroCep.textContent = "";

        const link = 'https://viacep.com.br/ws/' + cep + '/json/?callback=preencherEndereco';
        var script = document.createElement("script");
        script.src = link;
        document.body.appendChild(script);
    } else if(cep.length > 0) {
        cepInput.classList.add("invalid");
        cepInput.setCustomValidity("CEP deve conter 8 dígitos.");
        erroCep.textContent = "CEP inválido: informe exatamente 8 números.";
        cepInput.reportValidity();
    } else {
        cepInput.classList.remove("invalid");
        cepInput.setCustomValidity("");
        erroCep.textContent = "";
    }
}

function preencherEndereco(conteudo){
    if(!("erro" in conteudo)){
        document.getElementById("rua").value = conteudo.logradouro;
        document.getElementById("bairro").value = conteudo.bairro;
        document.getElementById("cidade").value = conteudo.localidade;
        document.getElementById("estado").value = conteudo.uf;
    }else{
        alert("CEP não encontrado!");
    }
}
function pegar_dados(){
    const dados = {
        nome: document.getElementById("nome").value,
        cpf: document.getElementById("cpf").value,
        email: document.getElementById("email").value,
        celular: document.getElementById("celular").value,
        senha: document.getElementById("senha").value,
        cep: document.getElementById("cep").value,
        rua: document.getElementById("rua").value,
        numero_casa: document.getElementById("numero_casa").value,
        bairro: document.getElementById("bairro").value,
        cidade: document.getElementById("cidade").value,
        estado: document.getElementById("estado").value,
        dt_nasc: document.getElementById("dt_nasc").value,
    }
    return JSON.stringify(dados)
}
async function enviar_cadastro(){
    const dados = pegar_dados()
    try{
        const resposta = await fetch("http://10.216.241.174:3000/cliente",{
            method: "POST",
            headers: { "content-type": "application/json"},
            body: dados
        })
        if (!resposta.ok) {alert("Erro ao cadastrar!")}
        alert("cliente cadastrado com sucesso!")
        }catch(error) { alert("Erro ao cadastrar!" + error.message)}
    }

</script>
</head>
<body>
    <main>
        <h1>Cadastro de Clientes</h1>
    <form>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" required>
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" required>
        <label for="email">E-mail:</label>
        <input type="email" id="email" required>
        <label for="celular">Celular:</label>
        <input type="tel" id="celular" placeholder="(99) 99999-9999" required>
        <label for="senha">Senha:</label>
        <input type="password" id="senha" required>
        <label for="cep">CEP:</label>
        <input type="text" id="cep" placeholder="00000-000" required oninput="pesquisar(this.value)">
        <span id="cepErro" class="error-message"></span>
        <label for="rua">Rua:</label>
        <input type="text" id="rua" required>
        <label for="numero_casa" >Numero da Casa:</label>
        <input type="text" id="numero_casa" required>
        <label for="bairro">Bairro:</label>
        <input type="text" id="bairro" required>
        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" required>
        <label for="estado">Estado:</label>
        <input type="text" id="estado" required>
        <label for="dt_nasc">Data de Nascimento:</label>
        <input type="text" id="dt_nasc" required>


        <input type="button" value="Enviar Cadastro" onclick="enviar_cadastro()">
        </form>
    </main>
</body>
</html>
